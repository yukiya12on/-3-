<div id="app"></div>
<script>
// ── データ ──────────────────────────────────────────────
const ACCOUNTS=["現金","当座預金","普通預金","小口現金","受取手形","売掛金","前払金","仮払金","立替金","未収入金","繰越商品","貯蔵品","建物","備品","車両運搬具","土地","建物減価償却累計額","備品減価償却累計額","車両運搬具減価償却累計額","支払手形","買掛金","前受金","仮受金","預り金","未払金","借入金","資本金","引出金","売上","受取利息","受取手数料","仕入","給料","支払家賃","支払利息","支払手数料","水道光熱費","通信費","消耗品費","旅費交通費","雑費","減価償却費","貸倒引当金","貸倒引当金繰入","貸倒損失","当座借越","現金過不足","固定資産売却損","固定資産売却益","損益"];

const QUESTIONS=[
  {id:1,category:"現金・預金",text:"商品を{A}円で現金販売した。",vars:{A:[5000,8000,358000]},
   tmpl:(v)=>[{side:"借方",account:"現金",amount:v.A},{side:"貸方",account:"売上",amount:v.A}],
   explanation:"商品の現金販売：現金（資産↑）/ 売上（収益↑）。"},
  {id:2,category:"現金・預金",text:"仕入先への買掛金{A}円を現金で支払った。",vars:{A:[3000,7500,245000]},
   tmpl:(v)=>[{side:"借方",account:"買掛金",amount:v.A},{side:"貸方",account:"現金",amount:v.A}],
   explanation:"買掛金（負債↓）/ 現金（資産↓）。"},
  {id:3,category:"現金・預金",text:"現金の帳簿残高が実際残高より{A}円多かった（原因不明）。",vars:{A:[500,2000,18000]},
   tmpl:(v)=>[{side:"借方",account:"現金過不足",amount:v.A},{side:"貸方",account:"現金",amount:v.A}],
   explanation:"現金不足：現金過不足（借方）/ 現金（貸方）。"},
  {id:4,category:"現金・預金",text:"普通預金から{A}円を引き出して現金とした。",vars:{A:[2000,5000,100000]},
   tmpl:(v)=>[{side:"借方",account:"現金",amount:v.A},{side:"貸方",account:"普通預金",amount:v.A}],
   explanation:"現金（資産↑）/ 普通預金（資産↓）。"},
  {id:5,category:"商品売買",text:"商品{A}円を掛けで仕入れた。",vars:{A:[4000,6000,312000]},
   tmpl:(v)=>[{side:"借方",account:"仕入",amount:v.A},{side:"貸方",account:"買掛金",amount:v.A}],
   explanation:"仕入（費用↑）/ 買掛金（負債↑）。"},
  {id:6,category:"商品売買",text:"商品{A}円を掛けで売り上げた。",vars:{A:[6000,9000,480000]},
   tmpl:(v)=>[{side:"借方",account:"売掛金",amount:v.A},{side:"貸方",account:"売上",amount:v.A}],
   explanation:"売掛金（資産↑）/ 売上（収益↑）。"},
  {id:7,category:"商品売買",text:"掛けで仕入れた商品のうち{A}円分を返品した。",vars:{A:[1000,3000,52000]},
   tmpl:(v)=>[{side:"借方",account:"買掛金",amount:v.A},{side:"貸方",account:"仕入",amount:v.A}],
   explanation:"仕入戻し：買掛金（負債↓）/ 仕入（費用↓）。"},
  {id:8,category:"商品売買",text:"得意先から売掛金{A}円の代金として現金を受け取った。",vars:{A:[5000,8000,275000]},
   tmpl:(v)=>[{side:"借方",account:"現金",amount:v.A},{side:"貸方",account:"売掛金",amount:v.A}],
   explanation:"現金（資産↑）/ 売掛金（資産↓）。"},
  {id:9,category:"商品売買",text:"商品注文を受け、手付金{A}円を現金で受け取った。",vars:{A:[2000,5000,100000]},
   tmpl:(v)=>[{side:"借方",account:"現金",amount:v.A},{side:"貸方",account:"前受金",amount:v.A}],
   explanation:"手付金受取：現金（資産↑）/ 前受金（負債↑）。"},
  {id:10,category:"商品売買",text:"仕入先に手付金{A}円を現金で支払った。",vars:{A:[2000,5000,80000]},
   tmpl:(v)=>[{side:"借方",account:"前払金",amount:v.A},{side:"貸方",account:"現金",amount:v.A}],
   explanation:"前払金（資産↑）/ 現金（資産↓）。"},
  {id:11,category:"手形",text:"売掛金{A}円の回収として、約束手形を受け取った。",vars:{A:[5000,7000,350000]},
   tmpl:(v)=>[{side:"借方",account:"受取手形",amount:v.A},{side:"貸方",account:"売掛金",amount:v.A}],
   explanation:"受取手形（資産↑）/ 売掛金（資産↓）。"},
  {id:12,category:"手形",text:"買掛金{A}円の支払として、約束手形を振り出した。",vars:{A:[4000,6000,280000]},
   tmpl:(v)=>[{side:"借方",account:"買掛金",amount:v.A},{side:"貸方",account:"支払手形",amount:v.A}],
   explanation:"買掛金（負債↓）/ 支払手形（負債↑）。"},
  {id:13,category:"固定資産",text:"備品{A}円を現金で購入した。",vars:{A:[8000,9000,480000]},
   tmpl:(v)=>[{side:"借方",account:"備品",amount:v.A},{side:"貸方",account:"現金",amount:v.A}],
   explanation:"備品（資産↑）/ 現金（資産↓）。"},
  {id:14,category:"固定資産",text:"建物の減価償却費{A}円を計上した（間接法）。",vars:{A:[3000,6000,240000]},
   tmpl:(v)=>[{side:"借方",account:"減価償却費",amount:v.A},{side:"貸方",account:"建物減価償却累計額",amount:v.A}],
   explanation:"減価償却費（費用↑）/ 建物減価償却累計額（資産控除↑）。間接法は累計額勘定を使います。"},
  {id:15,category:"固定資産",text:"備品（帳簿価額{A}円）を{B}円で現金売却した。",vars:{A:[5000,8000,400000],B:[3000,6000,280000]},
   tmpl:(v)=>[{side:"借方",account:"現金",amount:v.B},{side:"借方",account:"固定資産売却損",amount:v.A-v.B},{side:"貸方",account:"備品",amount:v.A}],
   explanation:"帳簿価額より低く売却 → 固定資産売却損が発生。現金（↑）＋売却損 / 備品（↓）。"},
  {id:16,category:"費用・収益",text:"事務所の家賃{A}円を現金で支払った。",vars:{A:[3000,8000,120000]},
   tmpl:(v)=>[{side:"借方",account:"支払家賃",amount:v.A},{side:"貸方",account:"現金",amount:v.A}],
   explanation:"支払家賃（費用↑）/ 現金（資産↓）。"},
  {id:17,category:"費用・収益",text:"従業員の給料{A}円を現金で支払った。",vars:{A:[5000,9000,280000]},
   tmpl:(v)=>[{side:"借方",account:"給料",amount:v.A},{side:"貸方",account:"現金",amount:v.A}],
   explanation:"給料（費用↑）/ 現金（資産↓）。"},
  {id:18,category:"費用・収益",text:"貸付金の利息{A}円を現金で受け取った。",vars:{A:[500,2000,36000]},
   tmpl:(v)=>[{side:"借方",account:"現金",amount:v.A},{side:"貸方",account:"受取利息",amount:v.A}],
   explanation:"現金（資産↑）/ 受取利息（収益↑）。"},
  {id:19,category:"費用・収益",text:"借入金の利息{A}円を現金で支払った。",vars:{A:[500,1500,24000]},
   tmpl:(v)=>[{side:"借方",account:"支払利息",amount:v.A},{side:"貸方",account:"現金",amount:v.A}],
   explanation:"支払利息（費用↑）/ 現金（資産↓）。"},
  {id:20,category:"決算整理",text:"売掛金残高{A}円に対し２%の貸倒引当金を設定する（初回設定）。",vars:{A:[5000,8000,500000]},
   tmpl:(v)=>[{side:"借方",account:"貸倒引当金繰入",amount:Math.round(v.A*0.02)},{side:"貸方",account:"貸倒引当金",amount:Math.round(v.A*0.02)}],
   explanation:"売掛金×2%を貸倒引当金繰入（費用）/ 貸倒引当金（資産控除）として設定します。"},
  {id:21,category:"決算整理",text:"期首繰越商品{A}円、期末繰越商品{B}円。売上原価の計算（仕入勘定法）をせよ。",vars:{A:[2000,4000,180000],B:[3000,6000,220000]},
   tmpl:(v)=>[{side:"借方",account:"仕入",amount:v.A},{side:"貸方",account:"繰越商品",amount:v.A},{side:"借方",account:"繰越商品",amount:v.B},{side:"貸方",account:"仕入",amount:v.B}],
   explanation:"期首商品を仕入に振替（仕入↑/繰越商品↓）、期末商品を繰越商品に振替（繰越商品↑/仕入↓）します。"},
  {id:22,category:"決算整理",text:"家賃の前払い分{A}円を計上した。",vars:{A:[1000,3000,60000]},
   tmpl:(v)=>[{side:"借方",account:"前払金",amount:v.A},{side:"貸方",account:"支払家賃",amount:v.A}],
   explanation:"費用の前払い：前払金（資産↑）/ 支払家賃（費用↓）。"},
  {id:23,category:"決算整理",text:"利息の未収分{A}円を計上した。",vars:{A:[500,2000,18000]},
   tmpl:(v)=>[{side:"借方",account:"未収入金",amount:v.A},{side:"貸方",account:"受取利息",amount:v.A}],
   explanation:"収益の未収：未収入金（資産↑）/ 受取利息（収益↑）。"},
  {id:24,category:"資本・その他",text:"店主が個人的に現金{A}円を事業から引き出した。",vars:{A:[2000,5000,100000]},
   tmpl:(v)=>[{side:"借方",account:"引出金",amount:v.A},{side:"貸方",account:"現金",amount:v.A}],
   explanation:"引出金（資本の減少）/ 現金（資産↓）。個人事業主特有の処理です。"},
  {id:25,category:"資本・その他",text:"社員の出張費を仮払いとして現金{A}円を渡した。",vars:{A:[2000,5000,80000]},
   tmpl:(v)=>[{side:"借方",account:"仮払金",amount:v.A},{side:"貸方",account:"現金",amount:v.A}],
   explanation:"仮払金（資産↑）/ 現金（資産↓）。内容確定後に振り替えます。"},
  {id:26,category:"資本・その他",text:"仮払金{A}円の精算：旅費交通費{B}円、残金を現金で受け取った。",vars:{A:[5000,5000,80000],B:[3000,3200,62000]},
   tmpl:(v)=>[{side:"借方",account:"旅費交通費",amount:v.B},{side:"借方",account:"現金",amount:v.A-v.B},{side:"貸方",account:"仮払金",amount:v.A}],
   explanation:"旅費交通費（費用↑）＋現金（お釣り）/ 仮払金（資産↓）。"},
  {id:27,category:"資本・その他",text:"得意先から内容不明の入金{A}円が当座預金にあった。",vars:{A:[3000,6000,150000]},
   tmpl:(v)=>[{side:"借方",account:"当座預金",amount:v.A},{side:"貸方",account:"仮受金",amount:v.A}],
   explanation:"内容不明の入金：当座預金（資産↑）/ 仮受金（負債↑）。内容判明後に振り替えます。"},
  {id:28,category:"資本・その他",text:"現金{A}円と備品{B}円を元入れして事業を開始した。",vars:{A:[5000,8000,500000],B:[3000,5000,200000]},
   tmpl:(v)=>[{side:"借方",account:"現金",amount:v.A},{side:"借方",account:"備品",amount:v.B},{side:"貸方",account:"資本金",amount:v.A+v.B}],
   explanation:"開業時：資産（現金＋備品）/ 資本金。"},
];

const CAT_COLORS={
  "現金・預金":{from:"#6366f1",to:"#818cf8",light:"#eef2ff",text:"#4338ca"},
  "商品売買":{from:"#7c3aed",to:"#a78bfa",light:"#f5f3ff",text:"#5b21b6"},
  "手形":{from:"#0891b2",to:"#22d3ee",light:"#ecfeff",text:"#0e7490"},
  "固定資産":{from:"#059669",to:"#34d399",light:"#ecfdf5",text:"#065f46"},
  "費用・収益":{from:"#d97706",to:"#fbbf24",light:"#fffbeb",text:"#92400e"},
  "決算整理":{from:"#dc2626",to:"#f87171",light:"#fef2f2",text:"#991b1b"},
  "資本・その他":{from:"#7c3aed",to:"#c084fc",light:"#faf5ff",text:"#6b21a8"},
};
const LEVELS=[
  {key:"easy",label:"Easy",emoji:"🌱",color:"#22c55e",idx:0,desc:"科目を選ぶだけ（金額入力不要）"},
  {key:"normal",label:"Normal",emoji:"📘",color:"#3b82f6",idx:1,desc:"¥10,000以内の金額"},
  {key:"hard",label:"Hard",emoji:"🔥",color:"#ef4444",idx:2,desc:"試験レベルの金額"},
];
const CATEGORIES=["すべて",...Object.keys(CAT_COLORS)];

function fmt(n){return Number(n).toLocaleString("ja-JP");}
function fillText(text,vars){return text.replace(/\{(\w+)\}/g,(_,k)=>vars[k]!==undefined?"¥"+fmt(vars[k]):_);}
function resolveVars(vars,idx){const o={};for(const[k,a]of Object.entries(vars))o[k]=a[idx];return o;}
function shuffle(arr){return[...arr].sort(()=>Math.random()-.5);}

// ── State ──────────────────────────────────────────────
let state={
  screen:"home",
  level:"normal",
  filterCat:"すべて",
  shuffled:[],
  qIndex:0,
  rows:[],
  checked:false,
  isCorrect:null,
  score:{correct:0,total:0},
  showError:false,
  openDropdown:null, // row index
  searchText:"",
};

function setState(patch){
  state=Object.assign({},state,typeof patch==="function"?patch(state):patch);
  render();
}

// ── Helpers ────────────────────────────────────────────
function currentLevel(){return LEVELS.find(l=>l.key===state.level);}
function currentQ(){return state.shuffled.length>0?state.shuffled[state.qIndex%state.shuffled.length]:null;}
function currentVars(){const q=currentQ();return q?resolveVars(q.vars,currentLevel().idx):null;}
function currentAnswer(){const q=currentQ();const v=currentVars();return q&&v?q.tmpl(v):[];}
function currentCC(){const q=currentQ();return q?(CAT_COLORS[q.category]||CAT_COLORS["商品売買"]):CAT_COLORS["商品売買"];}

function startQuiz(){
  const pool=state.filterCat==="すべて"?QUESTIONS:QUESTIONS.filter(q=>q.category===state.filterCat);
  const sh=shuffle(pool);
  const lIdx=currentLevel().idx;
  const q=sh[0];
  const v=resolveVars(q.vars,lIdx);
  const ans=q.tmpl(v);
  const rows=state.level==="easy"?ans.map(a=>({...a,account:""})):ans.map(a=>({...a,account:"",amount:""}));
  setState({screen:"quiz",shuffled:sh,qIndex:0,rows,checked:false,isCorrect:null,score:{correct:0,total:0},showError:false,openDropdown:null});
}

function loadNext(){
  const ni=state.qIndex+1;
  const q=state.shuffled[ni%state.shuffled.length];
  const v=resolveVars(q.vars,currentLevel().idx);
  const ans=q.tmpl(v);
  const rows=state.level==="easy"?ans.map(a=>({...a,account:""})):ans.map(a=>({...a,account:"",amount:""}));
  setState({qIndex:ni,rows,checked:false,isCorrect:null,showError:false,openDropdown:null});
}

function checkAnswer(){
  const ans=currentAnswer();
  const rows=state.rows.filter(r=>r.account&&(state.level==="easy"||r.amount));
  if(state.rows.some(r=>!r.account||(state.level!=="easy"&&!r.amount))){setState({showError:true});return;}
  const ok=ans.every(a=>rows.some(r=>r.side===a.side&&r.account===a.account&&(state.level==="easy"?true:Number(r.amount)===a.amount)))&&rows.length===ans.length;
  setState(s=>({checked:true,isCorrect:ok,score:{correct:s.score.correct+(ok?1:0),total:s.score.total+1}}));
}

function updateRowAccount(i,account){
  const rows=[...state.rows];
  rows[i]={...rows[i],account};
  setState({rows,openDropdown:null,searchText:""});
}
function updateRowAmount(i,amount){
  const rows=[...state.rows];
  rows[i]={...rows[i],amount};
  setState({rows});
}
function addRow(side){setState(s=>({rows:[...s.rows,{side,account:"",amount:""}]}));}
function removeRow(i){setState(s=>({rows:s.rows.filter((_,xi)=>xi!==i)}));}

// ── Render ─────────────────────────────────────────────
function el(tag,props,...children){
  const e=document.createElement(tag);
  if(props)for(const[k,v]of Object.entries(props)){
    if(k==="style"&&typeof v==="object"){Object.assign(e.style,v);}
    else if(k.startsWith("on")&&typeof v==="function"){e.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==="className"){e.className=v;}
    else e.setAttribute(k,v);
  }
  for(const c of children.flat()){
    if(c==null||c===false)continue;
    e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  }
  return e;
}

function renderHome(){
  const lv=currentLevel();
  return el("div",{style:{minHeight:"100vh",background:"linear-gradient(160deg,#4c1d95 0%,#7c3aed 50%,#6366f1 100%)",display:"flex",flexDirection:"column"}},
    // Hero
    el("div",{style:{padding:"60px 28px 32px",textAlign:"center"}},
      el("div",{style:{fontSize:48,marginBottom:8}},"📒"),
      el("div",{style:{color:"rgba(255,255,255,.7)",fontSize:13,fontWeight:700,letterSpacing:2,marginBottom:6}},"BOOKKEEPING LEVEL 3"),
      el("div",{style:{color:"#fff",fontSize:28,fontWeight:800,lineHeight:"1.2",marginBottom:8}},"仕訳トレーニング"),
      el("div",{style:{color:"rgba(255,255,255,.6)",fontSize:14}},"28問 ・ 全7分野 ・ 3段階レベル"),
    ),
    // Card
    el("div",{style:{flex:1,background:"#f5f3ff",borderRadius:"28px 28px 0 0",padding:"28px 20px 40px"}},
      // Level
      el("div",{style:{marginBottom:24}},
        el("div",{style:{fontSize:13,fontWeight:700,color:"#7c3aed",marginBottom:12,letterSpacing:.5}},"レベルを選ぶ"),
        el("div",{style:{display:"flex",gap:10}},
          ...LEVELS.map(l=>el("button",{
            style:{flex:1,padding:"14px 4px",borderRadius:14,border:"none",cursor:"pointer",
              background:state.level===l.key?l.color:"#fff",color:state.level===l.key?"#fff":"#374151",
              boxShadow:state.level===l.key?`0 4px 16px ${l.color}55`:"0 1px 4px rgba(0,0,0,.08)",transition:"all .2s"},
            onClick:()=>setState({level:l.key}),
          },
            el("div",{style:{fontSize:22}},l.emoji),
            el("div",{style:{fontWeight:800,fontSize:14,marginTop:4}},l.label),
            el("div",{style:{fontSize:10,marginTop:2,opacity:.8,lineHeight:"1.3"}},l.desc),
          ))
        ),
      ),
      // Category
      el("div",{style:{marginBottom:28}},
        el("div",{style:{fontSize:13,fontWeight:700,color:"#7c3aed",marginBottom:12,letterSpacing:.5}},"分野を選ぶ"),
        el("div",{style:{display:"flex",flexWrap:"wrap",gap:8}},
          ...CATEGORIES.map(cat=>el("button",{
            style:{padding:"8px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,
              background:state.filterCat===cat?"#7c3aed":"#fff",color:state.filterCat===cat?"#fff":"#6b7280",
              boxShadow:state.filterCat===cat?"0 2px 8px rgba(124,58,237,.35)":"0 1px 3px rgba(0,0,0,.08)"},
            onClick:()=>setState({filterCat:cat}),
          },cat))
        ),
      ),
      el("button",{
        style:{width:"100%",padding:"18px",borderRadius:16,border:"none",cursor:"pointer",
          background:"linear-gradient(135deg,#7c3aed,#6366f1)",color:"#fff",fontSize:18,fontWeight:800,
          boxShadow:"0 6px 24px rgba(124,58,237,.45)",letterSpacing:.5},
        onClick:startQuiz,
      },"トレーニング開始 →"),
    ),
  );
}

function renderAccountDropdown(i,row){
  const search=state.openDropdown===i?state.searchText:"";
  const filtered=ACCOUNTS.filter(a=>a.includes(search));
  return el("div",{style:{position:"relative",flex:1,minWidth:0}},
    el("div",{
      style:{border:`1.5px solid ${row.account?"#7c3aed":"#d1d5db"}`,borderRadius:10,
        padding:"10px 12px",cursor:"pointer",background:row.account?"#faf5ff":"#fff",
        color:row.account?"#1a1a2e":"#9ca3af",fontSize:15,
        display:"flex",justifyContent:"space-between",alignItems:"center"},
      onClick:(e)=>{e.stopPropagation();setState({openDropdown:state.openDropdown===i?null:i,searchText:""});},
    },
      el("span",{style:{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},row.account||"科目を選択"),
      el("span",{style:{fontSize:10,color:"#9ca3af",flexShrink:0,marginLeft:4}},"▼"),
    ),
    state.openDropdown===i?el("div",{style:{
      position:"absolute",top:"calc(100% + 4px)",left:0,zIndex:300,
      background:"#fff",border:"1.5px solid #7c3aed",borderRadius:12,
      boxShadow:"0 8px 32px rgba(124,58,237,.18)",width:"220px",maxHeight:260,
      overflow:"hidden",display:"flex",flexDirection:"column",
    }},
      el("input",{
        type:"text",placeholder:"🔍 科目を検索...",value:state.searchText,
        style:{border:"none",borderBottom:"1px solid #e9d5ff",padding:"10px 14px",fontSize:15,outline:"none",color:"#1a1a2e"},
        onInput:(e)=>setState({searchText:e.target.value}),
        onClick:(e)=>e.stopPropagation(),
      }),
      el("div",{style:{overflowY:"auto",maxHeight:200}},
        filtered.length===0?el("div",{style:{padding:"12px 14px",color:"#9ca3af",fontSize:14}},"見つかりません"):null,
        ...filtered.map(a=>el("div",{
          style:{padding:"11px 14px",cursor:"pointer",fontSize:15,
            background:row.account===a?"#f5f3ff":"transparent",color:"#1a1a2e",
            borderLeft:row.account===a?"3px solid #7c3aed":"3px solid transparent"},
          onClick:(e)=>{e.stopPropagation();updateRowAccount(i,a);},
          onMouseOver:(e)=>{e.currentTarget.style.background="#faf5ff";},
          onMouseOut:(e)=>{e.currentTarget.style.background=row.account===a?"#f5f3ff":"transparent";},
        },a))
      ),
    ):null,
  );
}

function renderJournalRow(row,i){
  const isDebit=row.side==="借方";
  const easy=state.level==="easy";
  const debitRows=state.rows.filter(r=>r.side==="借方");
  const creditRows=state.rows.filter(r=>r.side==="貸方");
  const canRemove=isDebit?debitRows.length>1:creditRows.length>1;
  return el("div",{style:{display:"flex",gap:8,alignItems:"center",marginBottom:8}},
    el("div",{style:{borderRadius:8,padding:"8px 6px",fontSize:13,fontWeight:800,
      background:isDebit?"#dbeafe":"#fce7f3",color:isDebit?"#1d4ed8":"#be185d",
      minWidth:38,textAlign:"center",flexShrink:0,letterSpacing:.5}},row.side),
    renderAccountDropdown(i,row),
    el("input",{
      type:"number",placeholder:"金額",inputmode:"numeric",
      value:row.amount||"",
      style:{border:`1.5px solid ${state.showError&&!row.amount&&!easy?"#ef4444":"#d1d5db"}`,
        borderRadius:10,padding:"10px 8px",fontSize:15,width:90,outline:"none",
        color:"#1a1a2e",flexShrink:0,background:easy?"#f3f4f6":"#fff",textAlign:"right"},
      disabled:easy,
      onInput:(e)=>updateRowAmount(i,e.target.value),
    }),
    canRemove?el("button",{
      style:{background:"#fee2e2",border:"none",borderRadius:8,cursor:"pointer",color:"#ef4444",
        fontSize:16,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0},
      onClick:()=>removeRow(i),
    },"×"):null,
  );
}

function renderQuiz(){
  const q=currentQ();
  if(!q)return el("div",{},"読み込み中...");
  const v=currentVars();
  const ans=currentAnswer();
  const cc=currentCC();
  const lv=currentLevel();
  const debitRows=state.rows.filter(r=>r.side==="借方");
  const creditRows=state.rows.filter(r=>r.side==="貸方");

  return el("div",{style:{minHeight:"100vh",background:"#f5f3ff",color:"#1a1a2e"},
    onClick:()=>{ if(state.openDropdown!==null)setState({openDropdown:null,searchText:""});}},
    // Header
    el("div",{style:{background:`linear-gradient(135deg,${cc.from},${cc.to})`,padding:"14px 16px",position:"sticky",top:0,zIndex:50}},
      el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
        el("button",{
          style:{background:"rgba(255,255,255,.2)",border:"none",borderRadius:10,padding:"6px 12px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"},
          onClick:()=>setState({screen:"home"}),
        },"← ホーム"),
        el("div",{style:{textAlign:"center"}},
          el("div",{style:{color:"rgba(255,255,255,.8)",fontSize:11,fontWeight:700}},lv.emoji+" "+lv.label),
          el("div",{style:{color:"#fff",fontSize:13,fontWeight:800}},"Q"+(state.qIndex+1)+" / "+state.shuffled.length),
        ),
        el("div",{style:{background:"rgba(255,255,255,.2)",borderRadius:10,padding:"6px 12px",textAlign:"center"}},
          el("div",{style:{color:"rgba(255,255,255,.8)",fontSize:10}},"正答率"),
          el("div",{style:{color:"#fff",fontWeight:800,fontSize:15}},state.score.total===0?"—":Math.round(state.score.correct/state.score.total*100)+"%"),
        ),
      ),
      el("div",{style:{marginTop:10,background:"rgba(255,255,255,.25)",borderRadius:4,height:4}},
        el("div",{style:{background:"#fff",height:4,borderRadius:4,width:((state.qIndex%state.shuffled.length)+1)/state.shuffled.length*100+"%",transition:"width .3s"}}),
      ),
    ),
    // Body
    el("div",{style:{padding:"16px 16px 80px",maxWidth:560,margin:"0 auto"}},
      // Question card
      el("div",{className:"slide-up",style:{background:"#fff",borderRadius:16,padding:"18px",marginBottom:14,
        boxShadow:"0 2px 16px rgba(124,58,237,.08)",borderTop:`4px solid ${cc.from}`}},
        el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
          el("span",{style:{background:cc.light,color:cc.text,borderRadius:8,padding:"4px 12px",fontSize:12,fontWeight:800}},q.category),
          state.level==="easy"?el("span",{style:{background:"#dcfce7",color:"#15803d",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700}},"🌱 科目のみ"):null,
        ),
        el("p",{style:{fontSize:16,lineHeight:"1.8",color:"#1a1a2e",fontWeight:500}},fillText(q.text,v)),
      ),
      // Input card
      el("div",{style:{background:"#fff",borderRadius:16,padding:"16px",marginBottom:14,boxShadow:"0 2px 16px rgba(124,58,237,.08)"}},
        el("div",{style:{fontSize:13,fontWeight:800,color:"#6b7280",marginBottom:14,letterSpacing:.5}},"仕訳を入力"),
        // Debit
        el("div",{style:{marginBottom:14}},
          el("div",{style:{fontSize:12,color:"#1d4ed8",fontWeight:800,marginBottom:8}},"借方"),
          ...state.rows.map((r,i)=>r.side==="借方"?renderJournalRow(r,i):null).filter(Boolean),
          el("button",{
            style:{background:"#eff6ff",color:"#3b82f6",border:"1.5px dashed #93c5fd",borderRadius:10,
              padding:"8px 16px",fontSize:13,cursor:"pointer",fontWeight:700},
            onClick:()=>addRow("借方"),
          },"＋ 借方を追加"),
        ),
        el("div",{style:{borderTop:"1.5px dashed #e9d5ff",margin:"14px 0"}}),
        // Credit
        el("div",{},
          el("div",{style:{fontSize:12,color:"#be185d",fontWeight:800,marginBottom:8}},"貸方"),
          ...state.rows.map((r,i)=>r.side==="貸方"?renderJournalRow(r,i):null).filter(Boolean),
          el("button",{
            style:{background:"#fdf2f8",color:"#be185d",border:"1.5px dashed #f9a8d4",borderRadius:10,
              padding:"8px 16px",fontSize:13,cursor:"pointer",fontWeight:700},
            onClick:()=>addRow("貸方"),
          },"＋ 貸方を追加"),
        ),
      ),
      // Error
      state.showError&&!state.checked?el("div",{style:{color:"#ef4444",fontSize:13,fontWeight:700,marginBottom:10,textAlign:"center"}},
        "⚠ すべての科目"+(state.level!=="easy"?"と金額":"")+"を入力してください"):null,
      // Check button
      !state.checked?el("button",{
        style:{width:"100%",padding:"16px",borderRadius:14,border:"none",cursor:"pointer",
          background:`linear-gradient(135deg,${cc.from},${cc.to})`,color:"#fff",fontSize:17,fontWeight:800,
          boxShadow:`0 6px 20px ${cc.from}55`},
        onClick:checkAnswer,
      },"答え合わせ"):null,
      // Result
      state.checked?el("div",{className:"slide-up",style:{
        background:state.isCorrect?"#f0fdf4":"#fff1f2",
        border:`2px solid ${state.isCorrect?"#86efac":"#fca5a5"}`,borderRadius:16,padding:"20px",
      }},
        el("div",{style:{fontSize:22,fontWeight:800,marginBottom:14,color:state.isCorrect?"#15803d":"#dc2626"}},
          state.isCorrect?"✅ 正解！":"❌ 不正解"),
        el("div",{style:{fontSize:12,fontWeight:800,color:"#6b7280",marginBottom:10,letterSpacing:.5}},"正しい仕訳"),
        el("div",{style:{background:"#fff",borderRadius:12,padding:"12px",marginBottom:14}},
          ...ans.map((a,i)=>el("div",{style:{display:"flex",gap:8,alignItems:"center",marginBottom:i<ans.length-1?8:0}},
            el("span",{style:{padding:"4px 8px",borderRadius:6,fontSize:12,fontWeight:800,flexShrink:0,
              background:a.side==="借方"?"#dbeafe":"#fce7f3",color:a.side==="借方"?"#1d4ed8":"#be185d"}},a.side),
            el("span",{style:{fontWeight:700,fontSize:15}},a.account),
            el("span",{style:{marginLeft:"auto",color:"#374151",fontWeight:700,flexShrink:0}},"¥"+fmt(a.amount)),
          ))
        ),
        el("div",{style:{background:"rgba(0,0,0,.04)",borderRadius:12,padding:"12px 14px",
          fontSize:13,lineHeight:"1.75",color:"#374151",marginBottom:16}},"💡 "+q.explanation),
        el("button",{
          style:{width:"100%",padding:"15px",borderRadius:14,border:"none",cursor:"pointer",
            background:`linear-gradient(135deg,${cc.from},${cc.to})`,color:"#fff",fontSize:17,fontWeight:800},
          onClick:loadNext,
        },"次の問題へ →"),
      ):null,
    ),
  );
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  app.appendChild(state.screen==="home"?renderHome():renderQuiz());
}

render();
</script>
</body>
</html>
